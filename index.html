<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>嘟嘟小火車 — 數序排列（中班）</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');

    :root {
      --track: #C8A97A; --rail: #8B6914;
      --slot-over: #C8F0DC; --slot-filled: #D0F5E0;
      --text-main: #3A2A10; --text-hint: #8A7A60;
      --success: #2A8A40; --error: #C03020;
      --c1bg:#FFECE7;--c1bd:#F5A082;--c1tx:#8B3012;
      --c2bg:#E8F0FF;--c2bd:#7EA8F0;--c2tx:#1A3A80;
      --c3bg:#FFF8E0;--c3bd:#F0C040;--c3tx:#7A5500;
      --c4bg:#F0EAFF;--c4bd:#B09AE8;--c4tx:#3A1F80;
      --c5bg:#E6FAE6;--c5bd:#80CC70;--c5tx:#1F6010;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Nunito','Noto Sans TC',sans-serif;min-height:100vh;overflow-x:hidden;position:relative;}
    body::before{content:'';position:fixed;inset:0;background:linear-gradient(180deg,#C8E8FA 0%,#E8F4FD 55%,#D4EDA0 55%,#B8D870 65%,#7DC46B 100%);z-index:0;}

    .cloud{position:fixed;background:white;border-radius:50px;opacity:.85;z-index:0;}
    .cloud::before,.cloud::after{content:'';position:absolute;background:white;border-radius:50%;}
    .c1{width:100px;height:36px;top:8%;left:5%;animation:drift 22s linear infinite;}
    .c1::before{width:50px;height:50px;top:-24px;left:12px;}.c1::after{width:36px;height:36px;top:-16px;left:44px;}
    .c2{width:130px;height:44px;top:18%;left:60%;animation:drift 30s linear infinite 5s;}
    .c2::before{width:60px;height:60px;top:-30px;left:18px;}.c2::after{width:44px;height:44px;top:-20px;left:64px;}
    .c3{width:80px;height:30px;top:5%;left:35%;animation:drift 18s linear infinite 10s;}
    .c3::before{width:40px;height:40px;top:-20px;left:10px;}.c3::after{width:28px;height:28px;top:-12px;left:38px;}
    @keyframes drift{from{transform:translateX(-200px)}to{transform:translateX(110vw)}}

    .sun{position:fixed;top:5%;right:8%;width:72px;height:72px;background:#FFD84A;border-radius:50%;z-index:0;
      box-shadow:0 0 0 10px rgba(255,220,60,.25),0 0 0 20px rgba(255,220,60,.12);animation:sunPulse 4s ease-in-out infinite;}
    @keyframes sunPulse{0%,100%{box-shadow:0 0 0 10px rgba(255,220,60,.25),0 0 0 20px rgba(255,220,60,.12)}50%{box-shadow:0 0 0 14px rgba(255,220,60,.3),0 0 0 28px rgba(255,220,60,.15)}}

    #app{position:relative;z-index:1;max-width:720px;margin:0 auto;padding:1.2rem 1rem 2rem;display:flex;flex-direction:column;align-items:center;gap:1rem;}

    /* ── Title ── */
    #game-title{font-size:2rem;font-weight:800;color:var(--text-main);text-align:center;letter-spacing:.02em;text-shadow:0 2px 0 rgba(255,255,255,.7);line-height:1.2;}
    #range-badge{font-size:1.1rem;font-weight:800;color:#7A2800;background:linear-gradient(135deg,#FFD08A,#FFAB50);padding:6px 22px;border-radius:30px;box-shadow:0 3px 10px rgba(255,140,50,.35);letter-spacing:.03em;display:none;}

    /* ── Difficulty screen ── */
    #difficulty-screen{width:100%;background:rgba(255,255,255,.88);border:2.5px solid rgba(200,169,122,.5);border-radius:24px;padding:1.8rem 1.2rem;backdrop-filter:blur(8px);display:flex;flex-direction:column;align-items:center;gap:1.2rem;}
    #diff-title{font-size:1.2rem;font-weight:800;color:var(--text-main);}
    #diff-subtitle{font-size:.9rem;color:var(--text-hint);font-weight:600;text-align:center;}
    #diff-buttons{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;}
    .diff-btn{
      padding:14px 28px;border-radius:50px;border:none;cursor:pointer;
      font-family:'Nunito',sans-serif;font-size:1rem;font-weight:800;
      transition:transform .15s,box-shadow .15s;letter-spacing:.02em;color:rgba(0,0,0,0.72);
    }
    .diff-btn:hover{transform:translateY(-3px) scale(1.05);}
    .diff-btn:active{transform:scale(.96);}
    .diff-1{background:linear-gradient(135deg,#7DD8F5,#3AAEDF);box-shadow:0 5px 16px rgba(30,140,200,.4);}
    .diff-2{background:linear-gradient(135deg,#FFCA5A,#F0900A);box-shadow:0 5px 16px rgba(220,100,20,.4);}
    .diff-3{background:linear-gradient(135deg,#C060F0,#8020D0);box-shadow:0 5px 16px rgba(150,30,220,.4);}
    .diff-4{background:linear-gradient(135deg,#FF8080,#E83050);box-shadow:0 5px 16px rgba(200,20,50,.4);}
    .diff-5{background:linear-gradient(135deg,#FFB347,#FF7A00);box-shadow:0 5px 16px rgba(200,80,0,.4);}
    .diff-label-sub{font-size:.78rem;font-weight:600;opacity:.85;margin-top:2px;display:block;}

    /* ── Game area ── */
    #game-area{width:100%;display:none;flex-direction:column;align-items:center;gap:1rem;}

    /* ── Track panel ── */
    #track-panel{width:100%;background:rgba(255,255,255,.72);border:2.5px solid rgba(200,169,122,.5);border-radius:20px;padding:1rem .9rem .7rem;backdrop-filter:blur(6px);}
    #track-label{font-size:11px;font-weight:700;color:var(--text-hint);letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px;padding-left:2px;}
    #train-row{display:flex;align-items:flex-end;gap:5px;overflow-x:auto;padding-bottom:4px;}
    #train-row::-webkit-scrollbar{height:4px;}
    #train-row::-webkit-scrollbar-thumb{background:rgba(0,0,0,.15);border-radius:4px;}
    #rails{margin-top:6px;height:12px;width:100%;position:relative;display:flex;align-items:center;}
    #rails::before{content:'';position:absolute;left:0;right:0;top:3px;height:3px;background:var(--rail);border-radius:2px;}
    #rails::after{content:'';position:absolute;left:0;right:0;bottom:3px;height:3px;background:var(--rail);border-radius:2px;}
    .sleeper{position:absolute;width:10px;height:12px;background:var(--track);border-radius:2px;z-index:1;}

    /* ── Scatter panel ── */
    #scatter-panel{width:100%;background:rgba(255,255,255,.65);border:2.5px dashed rgba(150,180,120,.6);border-radius:20px;padding:.9rem 1rem 1rem;backdrop-filter:blur(4px);}
    #scatter-label{font-size:11px;font-weight:700;color:var(--text-hint);letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px;}
    #cars-pool{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;min-height:96px;align-items:center;}

    /* ── Train car ── */
    .train-car{width:90px;height:82px;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:grab;user-select:none;touch-action:none;border:3px solid transparent;font-family:'Nunito',sans-serif;font-weight:700;transition:transform .15s,box-shadow .15s,opacity .15s;position:relative;flex-shrink:0;}
    .train-car:hover{transform:translateY(-4px) scale(1.05);box-shadow:0 8px 20px rgba(0,0,0,.14);}
    .train-car.dragging{opacity:.3;cursor:grabbing;transform:scale(.95);}
    .train-car .car-num{font-size:22px;font-weight:800;line-height:1;}
    .train-car .car-animal{display:flex;align-items:center;justify-content:center;margin-top:-2px;}
    .train-car .wheels{display:flex;gap:10px;margin-top:5px;align-items:center;}
    .train-car::after{content:'';position:absolute;right:-8px;top:50%;transform:translateY(-50%);width:8px;height:6px;background:rgba(100,80,40,.4);border-radius:0 3px 3px 0;}

    .car-1{background:var(--c1bg);border-color:var(--c1bd);color:var(--c1tx);}
    .car-2{background:var(--c2bg);border-color:var(--c2bd);color:var(--c2tx);}
    .car-3{background:var(--c3bg);border-color:var(--c3bd);color:var(--c3tx);}
    .car-4{background:var(--c4bg);border-color:var(--c4bd);color:var(--c4tx);}
    .car-5{background:var(--c5bg);border-color:var(--c5bd);color:var(--c5tx);}

    /* ── Slot ── */
    .slot{width:90px;height:82px;border:3px dashed #C8B89A;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;color:#C8B89A;flex-shrink:0;transition:border-color .2s,background .2s,transform .15s;background:rgba(255,255,255,.4);}
    .slot.over{border-color:#40C070;background:var(--slot-over);transform:scale(1.06);}
    .slot.filled{border-style:solid;border-color:#40B060;background:var(--slot-filled);}

    #engine-wrap{flex-shrink:0;}
    #ghost{position:fixed;pointer-events:none;z-index:9999;display:none;opacity:.9;transform:scale(1.12) rotate(-2deg);filter:drop-shadow(0 8px 16px rgba(0,0,0,.2));}

    /* ── Bottom buttons ── */
    #bottom-row{display:flex;gap:12px;align-items:center;justify-content:center;flex-wrap:wrap;}
    #restart-btn{display:none;padding:14px 36px;border-radius:50px;border:none;background:linear-gradient(135deg,#FF5F1F,#FF2D8A);color:white;font-family:'Nunito',sans-serif;font-size:17px;font-weight:800;cursor:pointer;box-shadow:0 6px 20px rgba(255,60,120,.5),0 0 0 4px rgba(255,100,150,.2);transition:transform .15s,box-shadow .15s;letter-spacing:.02em;}
    #restart-btn:hover{transform:translateY(-3px) scale(1.06);box-shadow:0 10px 28px rgba(255,60,120,.6),0 0 0 6px rgba(255,100,150,.25);}
    #back-btn{display:none;padding:14px 28px;border-radius:50px;border:none;background:linear-gradient(135deg,#60A8E0,#2070C0);color:white;font-family:'Nunito',sans-serif;font-size:17px;font-weight:800;cursor:pointer;box-shadow:0 6px 16px rgba(30,100,200,.4);transition:transform .15s;}
    #back-btn:hover{transform:translateY(-2px) scale(1.04);}

    /* ── Animations ── */
    @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-10px)}40%{transform:translateX(10px)}60%{transform:translateX(-8px)}80%{transform:translateX(8px)}}
    @keyframes bounceIn{0%{transform:scale(.4);opacity:0}65%{transform:scale(1.14)}100%{transform:scale(1);opacity:1}}
    @keyframes trainGo{0%{transform:translateX(0)}100%{transform:translateX(130vw)}}
    @keyframes steam{0%{transform:translateY(0) scale(1);opacity:.7}100%{transform:translateY(-30px) scale(1.6);opacity:0}}
    @keyframes popIn{0%{transform:scale(.6);opacity:0}70%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
    .shaking{animation:shake .4s ease;}
    .bounce-in{animation:bounceIn .38s cubic-bezier(.34,1.56,.64,1) forwards;}
    .train-going{animation:trainGo 1.8s ease-in forwards;}
    .pop-in{animation:popIn .4s cubic-bezier(.34,1.56,.64,1) forwards;}

    /* ── Confetti ── */
    #confetti-layer{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9998;}
    .conf-piece{position:absolute;border-radius:2px;animation:confFall linear forwards;}
    @keyframes confFall{0%{transform:translateY(-10px) rotate(0deg);opacity:1}100%{transform:translateY(105vh) rotate(540deg);opacity:0}}
    .steam-puff{position:absolute;width:14px;height:14px;background:rgba(255,255,255,.7);border-radius:50%;animation:steam .8s ease-out forwards;}

    @media (orientation: portrait) and (max-width: 600px) {
      #app { padding: .6rem .5rem 1rem; gap: .6rem; }
      #game-title { font-size: 1.3rem; }
      .diff-btn { padding: 10px 16px; font-size: .85rem; }
      .train-car, .slot { width: 62px; height: 58px; }
      .train-car .car-num { font-size: 15px; }
      .train-car .car-animal svg { width: 26px; height: 22px; }
      .train-car .wheels { gap: 6px; margin-top: 3px; }
      .train-car .wheels svg { width: 14px; height: 14px; }
      #train-row { gap: 2px; }
      #car-slots { gap: 2px; }
      #engine-wrap svg { width: 64px; height: 56px; }
      #cars-pool { gap: 8px; }
      #rotate-hint { display: flex; }
    }
    #rotate-hint {
      display: none; position: fixed; inset: 0; z-index: 99999;
      background: rgba(30,60,40,.85); flex-direction: column;
      align-items: center; justify-content: center;
      gap: 1rem; color: white; font-family: 'Nunito', sans-serif;
      font-size: 1.1rem; font-weight: 700; text-align: center; padding: 2rem;
    }
    #rotate-hint .icon { font-size: 3.5rem; animation: rotateIcon 2s ease-in-out infinite; }
    @keyframes rotateIcon { 0%,100%{transform:rotate(0deg)} 50%{transform:rotate(90deg)} }
      .train-car,.slot{width:72px;height:68px;}
      .train-car .car-num{font-size:19px;}
      #train-row{gap:3px;}
    }
  </style>
</head>
<body>
<div class="sun"></div>
<div class="cloud c1"></div>
<div class="cloud c2"></div>
<div class="cloud c3"></div>

<div id="app">
  <div id="game-title">🚂 嘟嘟小火車</div>
  <div id="range-badge"></div>

  <!-- ── 難度選擇 ── -->
  <div id="difficulty-screen">
    <div id="diff-title">選擇今天的挑戰！</div>
    <div id="diff-subtitle">每次會有 5 節連續車廂要排喔 🚃</div>
    <div id="diff-buttons">
      <button class="diff-btn diff-1" onclick="startGame('1-20','asc')">
        數字 1–20<br><span class="diff-label-sub">由小排到大 ⬆</span>
      </button>
      <button class="diff-btn diff-2" onclick="startGame('1-50','asc')">
        數字 1–50<br><span class="diff-label-sub">由小排到大 ⬆</span>
      </button>
      <button class="diff-btn diff-4" onclick="startGame('1-50','desc')">
        數字 50–1<br><span class="diff-label-sub">由大排到小 ⬇</span>
      </button>
      <button class="diff-btn diff-5" onclick="startGame('1-50','mix')">
        綜合挑戰<br><span class="diff-label-sub">正數或倒數隨機 🎲</span>
      </button>
    </div>
  </div>

  <!-- ── 遊戲區 ── -->
  <div id="game-area">
    <div id="track-panel">
      <div id="track-label">火車軌道 — 把車廂拖過來接上去！</div>
      <div id="train-row">
        <div id="engine-wrap">
          <svg width="98" height="82" viewBox="0 0 98 82" style="display:block;" aria-label="火車頭">
            <rect x="4" y="10" width="82" height="48" rx="10" fill="#3A3530"/>
            <rect x="10" y="16" width="34" height="26" rx="5" fill="#7DCCED"/>
            <rect x="48" y="22" width="30" height="18" rx="4" fill="#7DCCED"/>
            <rect x="78" y="34" width="14" height="10" rx="3" fill="#6A6058"/>
            <circle cx="88" cy="38" r="4" fill="#FFED80"/>
            <rect x="4" y="44" width="82" height="6" rx="2" fill="#D84020" opacity=".7"/>
            <rect x="4" y="56" width="82" height="8" rx="2" fill="#2A2520"/>
            <circle cx="18" cy="68" r="10" fill="#2A2520" stroke="#7A7060" stroke-width="2.5"/>
            <circle cx="18" cy="68" r="4" fill="#A09080"/>
            <circle cx="50" cy="68" r="10" fill="#2A2520" stroke="#7A7060" stroke-width="2.5"/>
            <circle cx="50" cy="68" r="4" fill="#A09080"/>
            <circle cx="78" cy="68" r="9" fill="#2A2520" stroke="#7A7060" stroke-width="2"/>
            <circle cx="78" cy="68" r="3.5" fill="#A09080"/>
            <rect x="6" y="2" width="9" height="12" rx="3" fill="#4A4038"/>
            <rect x="4" y="0" width="13" height="5" rx="2" fill="#3A3028"/>
            <rect x="86" y="40" width="10" height="6" rx="2" fill="#8A7860"/>
          </svg>
        </div>
        <div id="car-slots" style="display:flex;gap:5px;align-items:flex-end;"></div>
      </div>
      <div id="rails"></div>
    </div>

    <div id="scatter-panel">
      <div id="scatter-label">把車廂拖到正確的位置！</div>
      <div id="cars-pool"></div>
    </div>

    <div id="bottom-row">
      <button id="restart-btn" onclick="restartSame()">再玩一次 🎉</button>
      <button id="back-btn" onclick="goBack()">換難度 🔄</button>
    </div>
  </div>
</div>

<div id="rotate-hint"><div class="icon">📱</div><div>請將手機<br>橫放來玩喔！</div></div>
<div id="ghost"></div>
<div id="confetti-layer"></div>

<script>
(function(){
  /* Unlock audio on very first touch/click for iOS/Android */
  function _unlockOnce(){
    Tone.start().catch(()=>{});
    document.removeEventListener('touchstart',_unlockOnce,true);
    document.removeEventListener('mousedown',_unlockOnce,true);
  }
  document.addEventListener('touchstart',_unlockOnce,{once:true,capture:true});
  document.addEventListener('mousedown',_unlockOnce,{once:true,capture:true});
  const NOTES=['C4','D4','E4','F4','G4','A4','B4','C5','D5','E5',
               'F5','G5','A5','B5','C6','D6','E6','F6','G6','A6'];
  const ANIMALS=[
    `<svg width="36" height="32" viewBox="0 0 38 34"><circle cx="19" cy="20" r="12" fill="#C8924A"/><circle cx="10" cy="10" r="6" fill="#C8924A"/><circle cx="28" cy="10" r="6" fill="#C8924A"/><circle cx="10" cy="10" r="3.5" fill="#E8B870"/><circle cx="28" cy="10" r="3.5" fill="#E8B870"/><ellipse cx="19" cy="22" rx="7" ry="5" fill="#E8B870"/><circle cx="15.5" cy="18" r="2" fill="#3A2010"/><circle cx="22.5" cy="18" r="2" fill="#3A2010"/><ellipse cx="19" cy="23" rx="3" ry="2" fill="#3A2010"/><circle cx="16" cy="17.2" r=".7" fill="white"/><circle cx="23" cy="17.2" r=".7" fill="white"/></svg>`,
    `<svg width="36" height="32" viewBox="0 0 38 34"><ellipse cx="19" cy="22" rx="12" ry="10" fill="#FFD84A"/><circle cx="19" cy="11" r="8" fill="#FFD84A"/><ellipse cx="26.5" cy="11.5" rx="5" ry="3" fill="#FF9A30"/><circle cx="15.5" cy="9" r="2" fill="#3A2010"/><circle cx="21" cy="9" r="2" fill="#3A2010"/><circle cx="15" cy="8.3" r=".7" fill="white"/><circle cx="20.5" cy="8.3" r=".7" fill="white"/><ellipse cx="14" cy="27" rx="4" ry="2.5" fill="#FF9A30"/><ellipse cx="24" cy="27" rx="4" ry="2.5" fill="#FF9A30"/></svg>`,
    `<svg width="36" height="32" viewBox="0 0 38 34"><ellipse cx="12" cy="9" rx="4" ry="9" fill="#F0D8D8"/><ellipse cx="26" cy="9" rx="4" ry="9" fill="#F0D8D8"/><ellipse cx="12" cy="9" rx="2.5" ry="7" fill="#F0A0A0"/><ellipse cx="26" cy="9" rx="2.5" ry="7" fill="#F0A0A0"/><circle cx="19" cy="21" r="12" fill="#F0D8D8"/><circle cx="15" cy="19" r="2" fill="#3A2010"/><circle cx="23" cy="19" r="2" fill="#3A2010"/><circle cx="14.5" cy="18.3" r=".7" fill="white"/><circle cx="22.5" cy="18.3" r=".7" fill="white"/><ellipse cx="19" cy="22.5" rx="2.5" ry="1.8" fill="#F0A0A0"/><line x1="12" y1="23" x2="5" y2="21" stroke="#C08080" stroke-width="1.2" stroke-linecap="round"/><line x1="12" y1="24.5" x2="5" y2="24.5" stroke="#C08080" stroke-width="1.2" stroke-linecap="round"/><line x1="26" y1="23" x2="33" y2="21" stroke="#C08080" stroke-width="1.2" stroke-linecap="round"/><line x1="26" y1="24.5" x2="33" y2="24.5" stroke="#C08080" stroke-width="1.2" stroke-linecap="round"/></svg>`,
    `<svg width="36" height="32" viewBox="0 0 38 34"><polygon points="8,16 10,4 16,14" fill="#E8C080"/><polygon points="30,16 28,4 22,14" fill="#E8C080"/><circle cx="19" cy="21" r="12" fill="#E8C080"/><circle cx="15" cy="19" r="2.2" fill="#3A2010"/><circle cx="23" cy="19" r="2.2" fill="#3A2010"/><ellipse cx="15" cy="19" rx="1" ry="1.6" fill="#1A1010"/><ellipse cx="23" cy="19" rx="1" ry="1.6" fill="#1A1010"/><circle cx="14.5" cy="18.3" r=".6" fill="white"/><circle cx="22.5" cy="18.3" r=".6" fill="white"/><ellipse cx="19" cy="23" rx="2.2" ry="1.5" fill="#F0A0A0"/><line x1="11" y1="22" x2="4" y2="20" stroke="#C09040" stroke-width="1" stroke-linecap="round"/><line x1="11" y1="23.5" x2="4" y2="23.5" stroke="#C09040" stroke-width="1" stroke-linecap="round"/><line x1="27" y1="22" x2="34" y2="20" stroke="#C09040" stroke-width="1" stroke-linecap="round"/><line x1="27" y1="23.5" x2="34" y2="23.5" stroke="#C09040" stroke-width="1" stroke-linecap="round"/></svg>`,
    `<svg width="36" height="32" viewBox="0 0 38 34"><circle cx="10" cy="12" r="6" fill="#60C050"/><circle cx="28" cy="12" r="6" fill="#60C050"/><circle cx="10" cy="11" r="4" fill="white"/><circle cx="28" cy="11" r="4" fill="white"/><circle cx="10" cy="11" r="2.5" fill="#3A2010"/><circle cx="28" cy="11" r="2.5" fill="#3A2010"/><circle cx="9.2" cy="10.2" r=".8" fill="white"/><circle cx="27.2" cy="10.2" r=".8" fill="white"/><ellipse cx="19" cy="23" rx="13" ry="9" fill="#60C050"/><ellipse cx="19" cy="26" rx="9" ry="5" fill="#90E880"/><path d="M14 23 Q19 27 24 23" stroke="#3A7030" stroke-width="1.5" fill="none" stroke-linecap="round"/><ellipse cx="8" cy="29" rx="5" ry="3" fill="#60C050"/><ellipse cx="30" cy="29" rx="5" ry="3" fill="#60C050"/></svg>`
  ];

  let audioReady=false, marimba=null;
  let dragNum=null, ghostOffX=0, ghostOffY=0, activeSlot=null;
  let currentMode='', currentRange='', currentStart=1, currentEffectiveMode='asc';
  let carNumbers=[], placedMap={}, shuffledAnimals=[];

  function initAudio(){
    if(audioReady)return;
    marimba=new Tone.Synth({oscillator:{type:'triangle'},envelope:{attack:.002,decay:.35,sustain:.1,release:.6}}).toDestination();
    audioReady=true;
  }
  async function unlockAudio(){
    try{ await Tone.start(); initAudio(); }catch(e){}
  }
  function playNote(n){
    initAudio();
    try{Tone.start();const idx=Math.min(n-1,NOTES.length-1);marimba.triggerAttackRelease(NOTES[idx],'8n',Tone.now());}catch(e){}
  }
  function playError(){initAudio();try{Tone.start().then(()=>marimba.triggerAttackRelease('A3','16n',Tone.now()));}catch(e){}}
  function playFanfare(){
    initAudio();
    try{Tone.start().then(()=>{const now=Tone.now();['C4','E4','G4','C5','E5','G5'].forEach((n,i)=>marimba.triggerAttackRelease(n,'8n',now+i*.14));});}
    catch(e){}
  }

  function shuffle(a){let r=[...a];for(let i=r.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;}

  /* ── pick 5 consecutive numbers based on mode ── */
  function pickNumbers(range, mode){
    const max = range==='1-10' ? 10 : range==='1-20' ? 20 : 50;
    /* for mix, randomly decide asc or desc this round */
    let effectiveMode = mode;
    if(mode==='mix') effectiveMode = Math.random()<.5 ? 'asc' : 'desc';
    currentEffectiveMode = effectiveMode;
    /* random start from 1 to max-4 */
    const start=Math.floor(Math.random()*(max-4))+1;
    currentStart=start;
    const nums=[];
    for(let i=0;i<5;i++) nums.push(start+i);
    return effectiveMode==='desc' ? nums.reverse() : nums;
  }

  /* ── colour class cycles by position ── */
  const COLOR_CLASS=['car-1','car-2','car-3','car-4','car-5'];

  function wheelSVG(){
    return `<svg width="20" height="20" viewBox="0 0 22 22" style="display:block;">
      <circle cx="11" cy="11" r="10" fill="#2A2520" stroke="#7A7060" stroke-width="1.5"/>
      <circle cx="11" cy="11" r="6.5" fill="#4A4038"/>
      <line x1="11" y1="2" x2="11" y2="20" stroke="#7A7060" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="2" y1="11" x2="20" y2="11" stroke="#7A7060" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="4.5" y1="4.5" x2="17.5" y2="17.5" stroke="#7A7060" stroke-width="1" stroke-linecap="round"/>
      <line x1="17.5" y1="4.5" x2="4.5" y2="17.5" stroke="#7A7060" stroke-width="1" stroke-linecap="round"/>
      <circle cx="11" cy="11" r="2.5" fill="#C0A870"/>
    </svg>`;
  }

  /* posIdx 0-4 determines colour; num is the actual number shown */
  function carInnerHTML(num, posIdx){
    return `<div class="car-num">${num}</div>
            <div class="car-animal">${shuffledAnimals[posIdx]}</div>
            <div class="wheels">${wheelSVG()}${wheelSVG()}</div>`;
  }

  function makeCar(num, posIdx){
    const d=document.createElement('div');
    d.className=`train-car ${COLOR_CLASS[posIdx]}`;
    d.id=`car-${num}`;
    d.dataset.num=num;
    d.dataset.pos=posIdx;
    d.setAttribute('role','button');
    d.setAttribute('aria-label',`${num}號車廂`);
    d.innerHTML=carInnerHTML(num,posIdx);
    attachDrag(d);
    return d;
  }

  function makeGhost(num,posIdx){
    const d=document.createElement('div');
    d.className=`train-car ${COLOR_CLASS[posIdx]}`;
    d.style.cssText='width:90px;height:82px;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;border:3px solid transparent;font-family:Nunito,sans-serif;font-weight:700;';
    d.innerHTML=carInnerHTML(num,posIdx);
    return d;
  }

  /* ── Drag ── */
  function attachDrag(el){
    el.addEventListener('mousedown',onMouseDown,{passive:false});
    el.addEventListener('touchstart',onTouchStart,{passive:false});
  }
  function startDrag(num,cx,cy,rect,posIdx){
    dragNum=num;
    const g=document.getElementById('ghost');
    g.innerHTML='';
    g.appendChild(makeGhost(num,posIdx));
    g.style.display='block';
    ghostOffX=cx-rect.left; ghostOffY=cy-rect.top;
    moveGhost(cx,cy);
    const car=document.getElementById(`car-${num}`);
    if(car) car.classList.add('dragging');
  }
  function moveGhost(cx,cy){
    const g=document.getElementById('ghost');
    g.style.left=(cx-ghostOffX)+'px'; g.style.top=(cy-ghostOffY)+'px';
    const slot=slotUnder(cx,cy);
    if(activeSlot&&activeSlot!==slot) activeSlot.classList.remove('over');
    if(slot){slot.classList.add('over');activeSlot=slot;}else activeSlot=null;
  }
  function endDrag(cx,cy){
    document.getElementById('ghost').style.display='none';
    if(activeSlot) activeSlot.classList.remove('over');
    activeSlot=null;
    const car=document.getElementById(`car-${dragNum}`);
    if(car) car.classList.remove('dragging');
    const slot=slotUnder(cx,cy);
    const num=dragNum; dragNum=null;
    if(!slot){bounceback(num);return;}
    const slotNum=parseInt(slot.dataset.slotNum);
    if(num!==slotNum){
      playError(); bounceback(num);
      return;
    }
    acceptCar(num,slot);
  }
  function bounceback(num){
    const car=document.getElementById(`car-${num}`);
    if(!car)return;
    car.classList.remove('shaking'); void car.offsetWidth;
    car.classList.add('shaking');
    car.addEventListener('animationend',()=>car.classList.remove('shaking'),{once:true});
  }
  function acceptCar(num,slot){
    playNote(num);
    const car=document.getElementById(`car-${num}`);
    const posIdx=car?parseInt(car.dataset.pos):0;
    if(car&&car.parentNode) car.parentNode.removeChild(car);
    const placed=document.createElement('div');
    placed.className=`train-car ${COLOR_CLASS[posIdx]} bounce-in`;
    placed.style.pointerEvents='none';
    placed.innerHTML=carInnerHTML(num,posIdx);
    slot.innerHTML=''; slot.appendChild(placed); slot.classList.add('filled');
    steamPuff();
    placedMap[num]=true;
    if(Object.keys(placedMap).length>=5){
      setTimeout(startTrain,600);
    }
  }
  function slotUnder(cx,cy){
    for(const s of document.querySelectorAll('.slot')){
      const r=s.getBoundingClientRect();
      if(cx>=r.left&&cx<=r.right&&cy>=r.top&&cy<=r.bottom) return s;
    }
    return null;
  }
  function onMouseDown(e){
    if(e.button!==0)return; e.preventDefault();
    const num=parseInt(e.currentTarget.dataset.num);
    const posIdx=parseInt(e.currentTarget.dataset.pos);
    startDrag(num,e.clientX,e.clientY,e.currentTarget.getBoundingClientRect(),posIdx);
    const onMove=e=>moveGhost(e.clientX,e.clientY);
    const onUp=e=>{endDrag(e.clientX,e.clientY);document.removeEventListener('mousemove',onMove);document.removeEventListener('mouseup',onUp);};
    document.addEventListener('mousemove',onMove); document.addEventListener('mouseup',onUp);
  }
  function onTouchStart(e){
    e.preventDefault();
    const t=e.touches[0];
    const num=parseInt(e.currentTarget.dataset.num);
    const posIdx=parseInt(e.currentTarget.dataset.pos);
    startDrag(num,t.clientX,t.clientY,e.currentTarget.getBoundingClientRect(),posIdx);
    const onMove=e=>{const t=e.touches[0];moveGhost(t.clientX,t.clientY);};
    const onEnd=e=>{const t=e.changedTouches[0];endDrag(t.clientX,t.clientY);document.removeEventListener('touchmove',onMove);document.removeEventListener('touchend',onEnd);};
    document.addEventListener('touchmove',onMove,{passive:false}); document.addEventListener('touchend',onEnd);
  }

  /* ── Train & FX ── */
  function steamPuff(){
    const ew=document.getElementById('engine-wrap');
    ew.style.position='relative';
    const p=document.createElement('div'); p.className='steam-puff';
    p.style.cssText='position:absolute;top:-5px;left:10px;z-index:10;pointer-events:none;';
    ew.appendChild(p); p.addEventListener('animationend',()=>p.remove(),{once:true});
  }
  function startTrain(){
    playFanfare(); launchConfetti();
    const panel=document.getElementById('track-panel');
    panel.classList.add('train-going');
    panel.addEventListener('animationend',()=>{
      document.getElementById('restart-btn').style.display='inline-block';
      document.getElementById('back-btn').style.display='inline-block';
    },{once:true});
  }
  function launchConfetti(){
    const layer=document.getElementById('confetti-layer'); layer.innerHTML='';
    const cols=['#F5A082','#7EA8F0','#F0C040','#B09AE8','#80CC70','#F080A0','#60D0D0'];
    for(let i=0;i<60;i++){
      const d=document.createElement('div'); d.className='conf-piece';
      const sz=8+Math.floor(Math.random()*10);
      d.style.left=Math.random()*100+'vw';
      d.style.background=cols[Math.floor(Math.random()*cols.length)];
      d.style.animationDelay=(Math.random())+'s';
      d.style.animationDuration=(.9+Math.random()*.8)+'s';
      d.style.width=sz+'px'; d.style.height=sz+'px';
      d.style.borderRadius=Math.random()>.5?'50%':'2px';
      layer.appendChild(d);
    }
    setTimeout(()=>layer.innerHTML='',3200);
  }

  function buildRails(){
    const rails=document.getElementById('rails'); rails.innerHTML='';
    const w=rails.offsetWidth||600;
    const count=Math.floor(w/22);
    for(let i=0;i<count;i++){
      const s=document.createElement('div'); s.className='sleeper';
      s.style.left=(i*22+4)+'px'; rails.appendChild(s);
    }
  }

  /* ── startGame ── */
  window.startGame=function(range, mode){
    currentRange=range; currentMode=mode;
    carNumbers=pickNumbers(range,mode);
    shuffledAnimals=shuffle([...ANIMALS]);
    placedMap={};
    dragNum=null; activeSlot=null;

    /* Badge */
    const badge=document.getElementById('range-badge');
    const lo = currentStart, hi = currentStart+4;
    let modeLabel = currentEffectiveMode==='desc' ? '由大到小 ⬇' : '由小到大 ⬆';
    if(mode==='mix') modeLabel += ' 🎲';
    badge.textContent = currentEffectiveMode==='desc'
      ? `第 ${hi} 號 → 第 ${lo} 號車廂　${modeLabel}`
      : `第 ${lo} 號 → 第 ${hi} 號車廂　${modeLabel}`;
    badge.style.display='block';
    badge.classList.remove('pop-in'); void badge.offsetWidth; badge.classList.add('pop-in');

    /* Show game, hide difficulty */
    document.getElementById('difficulty-screen').style.display='none';
    const ga=document.getElementById('game-area');
    ga.style.display='flex';

    /* Reset track & pool */
    document.getElementById('track-panel').classList.remove('train-going');
    document.getElementById('restart-btn').style.display='none';
    document.getElementById('back-btn').style.display='none';
    document.getElementById('ghost').style.display='none';
    document.getElementById('confetti-layer').innerHTML='';

    const slotsDiv=document.getElementById('car-slots'); slotsDiv.innerHTML='';
    carNumbers.forEach(num=>{
      const s=document.createElement('div'); s.className='slot';
      s.dataset.slotNum=num; s.textContent='？'; slotsDiv.appendChild(s);
    });

    const pool=document.getElementById('cars-pool'); pool.innerHTML='';
    /* shuffle order in pool, keep posIdx tied to original car */
    const posMap={};
    carNumbers.forEach((num,i)=>posMap[num]=i);
    shuffle([...carNumbers]).forEach(num=>pool.appendChild(makeCar(num,posMap[num])));

    setTimeout(buildRails,50);
  };

  window.restartSame=function(){
    startGame(currentRange,currentMode);
  };

  window.goBack=function(){
    document.getElementById('game-area').style.display='none';
    document.getElementById('difficulty-screen').style.display='flex';
    document.getElementById('range-badge').style.display='none';
    document.getElementById('track-panel').classList.remove('train-going');
    document.getElementById('confetti-layer').innerHTML='';
  };

  window.addEventListener('resize',buildRails);
})();
</script>
</body>
</html>
